on:
  push:
    branches: ["b*.*.*"]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.detect.outputs.runner }}
      container: ${{ steps.detect.outputs.container }}
    steps:
      - id: detect
        run: |
          REF="${{ github.workflow_ref }}"
          REF="${REF%%@*}"
          FILE="${REF##*/}"
          FILE="${FILE%.yml}"
          RUNNER="${FILE%%--*}"
          TARGET="${FILE#*--}"

          CONTAINER=""
          case "$TARGET" in
            linux-*-musl)   CONTAINER="alpine:3.21" ;;
            linux-i686)     CONTAINER="i386/debian:bookworm" ;;
          esac

          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ needs.setup.outputs.runner }}
    container: ${{ needs.setup.outputs.container }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-target
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
