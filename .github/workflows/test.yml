name: Test Rust Crate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-14
            target: macos-aarch64
          - os: windows-latest
            target: windows-msvc

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        id: llvm
        uses: ./
        with:
          version: "18.1.8"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test llvm-full crate
        shell: bash
        env:
          LLVM_FULL_PREFIX: ${{ steps.llvm.outputs.prefix }}
        run: cargo test --features llvm18-1

      - name: Test llvm-sys integration
        shell: bash
        env:
          LLVM_FULL_PREFIX: ${{ steps.llvm.outputs.prefix }}
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml
