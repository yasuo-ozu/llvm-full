name: Test Rust Crate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        version:
          - "10.0.1"
          - "11.0.1"
          - "12.0.1"
          - "13.0.1"
          - "14.0.6"
          - "15.0.7"
          - "16.0.6"
          - "17.0.6"
          - "18.1.8"
          - "19.1.7"
          - "20.1.8"
          - "21.1.4"
          - "22.1.0"
        target:
          - linux-x86_64
          - linux-aarch64
          - linux-x86_64-musl
          - linux-aarch64-musl
          - linux-i686
          - macos-aarch64
          - macos-x86_64
          - windows-msvc
          - windows-gnu
          - windows-aarch64-msvc
          - windows-i686-msvc
          - windows-i686-gnu
        include:
          # Runner per target
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: linux-x86_64-musl
            runner: ubuntu-latest
          - target: linux-aarch64-musl
            runner: ubuntu-24.04-arm
          - target: linux-i686
            runner: ubuntu-latest
          - target: macos-aarch64
            runner: macos-latest
          - target: macos-x86_64
            runner: macos-13
          - target: windows-msvc
            runner: windows-latest
          - target: windows-gnu
            runner: windows-latest
          - target: windows-aarch64-msvc
            runner: windows-11-arm
          - target: windows-i686-msvc
            runner: windows-latest
          - target: windows-i686-gnu
            runner: windows-latest
          # Rust feature per version
          - version: "10.0.1"
            feature: llvm10-0
          - version: "11.0.1"
            feature: llvm11-0
          - version: "12.0.1"
            feature: llvm12-0
          - version: "13.0.1"
            feature: llvm13-0
          - version: "14.0.6"
            feature: llvm14-0
          - version: "15.0.7"
            feature: llvm15-0
          - version: "16.0.6"
            feature: llvm16-0
          - version: "17.0.6"
            feature: llvm17-0
          - version: "18.1.8"
            feature: llvm18-1
          - version: "19.1.7"
            feature: llvm19-1
          - version: "20.1.8"
            feature: llvm20-1
          - version: "21.1.4"
            feature: llvm21-1
          - version: "22.1.0"
            feature: llvm22-1

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.version }} / ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Runtime dependencies for non-native targets ───────────────
      - name: Install musl runtime
        if: matrix.target == 'linux-x86_64-musl' || matrix.target == 'linux-aarch64-musl'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl

      - name: Install i386 runtime
        if: matrix.target == 'linux-i686'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq libc6:i386 libstdc++6:i386 zlib1g:i386

      - name: Add MINGW64 to PATH
        if: matrix.target == 'windows-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw64\\bin" >> "$GITHUB_PATH"

      - name: Add MINGW32 to PATH
        if: matrix.target == 'windows-i686-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw32\\bin" >> "$GITHUB_PATH"

      # ── Install LLVM ──────────────────────────────────────────────
      - name: Install LLVM
        id: llvm
        uses: ./
        with:
          version: ${{ matrix.version }}
          target: ${{ matrix.target }}
          fallback: "false"

      # ── Rust crate tests ──────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test llvm-full crate
        shell: bash
        env:
          LLVM_FULL_PREFIX: ${{ steps.llvm.outputs.prefix }}
        run: cargo test --features ${{ matrix.feature }}

      - name: Test llvm-sys integration
        if: matrix.version == '18.1.8' && env.LLVM_CONFIG != ''
        shell: bash
        env:
          LLVM_FULL_PREFIX: ${{ steps.llvm.outputs.prefix }}
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml
