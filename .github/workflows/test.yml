name: Test Rust Crate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - linux-x86_64-musl
          - linux-aarch64-musl
          - linux-i686
          - macos-aarch64
          - macos-x86_64
          - windows-msvc
          - windows-gnu
          - windows-aarch64-msvc
          - windows-i686-msvc
          - windows-i686-gnu
        include:
          # Runner per target
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: linux-x86_64-musl
            runner: ubuntu-latest
          - target: linux-aarch64-musl
            runner: ubuntu-24.04-arm
          - target: linux-i686
            runner: ubuntu-latest
          - target: macos-aarch64
            runner: macos-latest
          - target: macos-x86_64
            runner: macos-15-intel
          - target: windows-msvc
            runner: windows-latest
          - target: windows-gnu
            runner: windows-latest
          - target: windows-aarch64-msvc
            runner: windows-11-arm
          - target: windows-i686-msvc
            runner: windows-latest
          - target: windows-i686-gnu
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Runtime dependencies for non-native targets ───────────────
      - name: Install musl runtime
        if: matrix.target == 'linux-x86_64-musl' || matrix.target == 'linux-aarch64-musl'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl

      - name: Install i386 runtime
        if: matrix.target == 'linux-i686'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq libc6:i386 libstdc++6:i386 zlib1g:i386

      - name: Add MINGW64 to PATH
        if: matrix.target == 'windows-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw64\\bin" >> "$GITHUB_PATH"

      - name: Add MINGW32 to PATH
        if: matrix.target == 'windows-i686-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw32\\bin" >> "$GITHUB_PATH"

      # ── Install LLVM ──────────────────────────────────────────────
      #- name: Install LLVM
      #  id: llvm
      #  uses: ./
      #  with:
      #    version: ${{ matrix.version }}
      #    target: ${{ matrix.target }}
      #    fallback: "false"

      # ── Rust crate tests ──────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      #- name: Test llvm-full crate
      #  shell: bash
      #  env:
      #    LLVM_FULL_PREFIX: ${{ steps.llvm.outputs.prefix }}
      #  run: cargo test --features ${{ matrix.feature }}

      - name: Test llvm-sys integration on LLVM10
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm10-0

      - name: Test llvm-sys integration on LLVM11
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm11-0

      - name: Test llvm-sys integration on LLVM12
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm12-0

      - name: Test llvm-sys integration on LLVM13
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm13-0

      - name: Test llvm-sys integration on LLVM14
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm14-0

      - name: Test llvm-sys integration on LLVM15
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm15-0

      - name: Test llvm-sys integration on LLVM16
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm16-0

      - name: Test llvm-sys integration on LLVM17
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm17-0

      - name: Test llvm-sys integration on LLVM18
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm18-1

      - name: Test llvm-sys integration on LLVM19
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm19-1

      - name: Test llvm-sys integration on LLVM20
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm20-1

      - name: Test llvm-sys integration on LLVM21
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm21-1

      - name: Test llvm-sys integration on LLVM22
        shell: bash
        run: cargo test --manifest-path tests/llvm-sys-test/Cargo.toml --features llvm22-1
