name: Build LLVM

on:
  push:
    branches:
      - "b*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Existing targets ──────────────────────────────────────
          - target: linux-x86_64
            os: ubuntu-latest
            archive_ext: tar.xz
            llvm_targets: "X86"
          - target: macos-aarch64
            os: macos-14
            archive_ext: tar.xz
            llvm_targets: "X86;AArch64"
          - target: macos-x86_64
            os: macos-13
            archive_ext: tar.xz
            llvm_targets: "X86;AArch64"
          - target: windows-msvc
            os: windows-latest
            archive_ext: zip
            llvm_targets: "X86"
          - target: windows-gnu
            os: windows-latest
            archive_ext: zip
            llvm_targets: "X86"
            msys2: MINGW64
          # ── New: Linux ARM64 ──────────────────────────────────────
          - target: linux-aarch64
            os: ubuntu-24.04-arm
            archive_ext: tar.xz
            llvm_targets: "AArch64"
          # ── New: Linux musl ───────────────────────────────────────
          - target: linux-x86_64-musl
            os: ubuntu-latest
            archive_ext: tar.xz
            llvm_targets: "X86"
            container: alpine:3.21
          - target: linux-aarch64-musl
            os: ubuntu-24.04-arm
            archive_ext: tar.xz
            llvm_targets: "AArch64"
            container: alpine:3.21
          # ── New: Linux i686 ───────────────────────────────────────
          - target: linux-i686
            os: ubuntu-latest
            archive_ext: tar.xz
            llvm_targets: "X86"
            container: i386/ubuntu:24.04
          # ── New: Windows ARM64 ────────────────────────────────────
          - target: windows-aarch64-msvc
            os: windows-11-arm
            archive_ext: zip
            llvm_targets: "AArch64"
          # ── New: Windows i686 ─────────────────────────────────────
          - target: windows-i686-msvc
            os: windows-latest
            archive_ext: zip
            llvm_targets: "X86"
          - target: windows-i686-gnu
            os: windows-latest
            archive_ext: zip
            llvm_targets: "X86"
            msys2: MINGW32

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${BRANCH#b}"
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "Building LLVM ${VERSION} for ${{ matrix.target }}"

      # ── Install build dependencies ──────────────────────────────
      - name: Install build dependencies (Alpine container)
        if: startsWith(matrix.container, 'alpine')
        shell: sh
        run: apk add --no-cache cmake ninja gcc g++ musl-dev linux-headers python3 git bash

      - name: Install build dependencies (i386 Ubuntu container)
        if: matrix.container == 'i386/ubuntu:24.04'
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -qq -y cmake ninja-build gcc g++ python3 git

      - name: Install build dependencies (Linux native)
        if: runner.os == 'Linux' && matrix.container == ''
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y ninja-build cmake

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install ninja cmake

      - name: Set up MSYS2 (MINGW64)
        if: matrix.msys2 == 'MINGW64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git
          pacboy: toolchain:p cmake:p ninja:p

      - name: Set up MSYS2 (MINGW32)
        if: matrix.msys2 == 'MINGW32'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: git
          pacboy: toolchain:p cmake:p ninja:p

      # ── Clone source ────────────────────────────────────────────
      - name: Clone LLVM source
        shell: bash
        run: |
          git clone --depth 1 --branch "llvmorg-${{ steps.version.outputs.version }}" \
            https://github.com/llvm/llvm-project "$RUNNER_TEMP/llvm-project"

      # ── Configure ───────────────────────────────────────────────
      - name: Configure LLVM (Unix / container)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          cmake_args=()
          if [ "$MAJOR" -le 11 ]; then
            cmake_args+=(-DCMAKE_POLICY_VERSION_MINIMUM=3.5)
          fi
          cmake -S "$RUNNER_TEMP/llvm-project/llvm" -B "$RUNNER_TEMP/llvm-build" -G Ninja \
            "${cmake_args[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/llvm-install" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_TERMINFO=OFF

      - name: Configure LLVM (Windows MSVC x64)
        if: matrix.target == 'windows-msvc'
        shell: bash
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          toolset_args=()
          if [ "$MAJOR" -le 11 ]; then
            toolset_args=(-T v142)
          fi
          cmake -S "$RUNNER_TEMP/llvm-project/llvm" -B "$RUNNER_TEMP/llvm-build" \
            -G "Visual Studio 17 2022" -A x64 \
            "${toolset_args[@]}" \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/llvm-install" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_LIBXML2=OFF

      - name: Configure LLVM (Windows MSVC ARM64)
        if: matrix.target == 'windows-aarch64-msvc'
        shell: bash
        run: |
          cmake -S "$RUNNER_TEMP/llvm-project/llvm" -B "$RUNNER_TEMP/llvm-build" \
            -G "Visual Studio 17 2022" -A ARM64 \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/llvm-install" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_LIBXML2=OFF

      - name: Configure LLVM (Windows MSVC i686)
        if: matrix.target == 'windows-i686-msvc'
        shell: bash
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          toolset_args=()
          if [ "$MAJOR" -le 11 ]; then
            toolset_args=(-T v142)
          fi
          cmake -S "$RUNNER_TEMP/llvm-project/llvm" -B "$RUNNER_TEMP/llvm-build" \
            -G "Visual Studio 17 2022" -A Win32 \
            "${toolset_args[@]}" \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/llvm-install" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_LIBXML2=OFF

      - name: Configure LLVM (Windows GNU x64)
        if: matrix.target == 'windows-gnu'
        shell: msys2 {0}
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          SRC_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-project"
          BUILD_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-build"
          INSTALL_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-install"
          cmake_args=()
          if [ "$MAJOR" -le 11 ]; then
            cmake_args+=(-DCMAKE_POLICY_VERSION_MINIMUM=3.5)
          fi
          cmake -S "$SRC_ROOT/llvm" -B "$BUILD_ROOT" -G Ninja \
            "${cmake_args[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_ROOT" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_HOST_TRIPLE="x86_64-w64-windows-gnu"

      - name: Configure LLVM (Windows GNU i686)
        if: matrix.target == 'windows-i686-gnu'
        shell: msys2 {0}
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          SRC_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-project"
          BUILD_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-build"
          INSTALL_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-install"
          cmake_args=()
          if [ "$MAJOR" -le 11 ]; then
            cmake_args+=(-DCMAKE_POLICY_VERSION_MINIMUM=3.5)
          fi
          cmake -S "$SRC_ROOT/llvm" -B "$BUILD_ROOT" -G Ninja \
            "${cmake_args[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_ROOT" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="${{ matrix.llvm_targets }}" \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_HOST_TRIPLE="i686-w64-windows-gnu"

      # ── Build ───────────────────────────────────────────────────
      - name: Build LLVM (MSYS2)
        if: matrix.msys2 != ''
        shell: msys2 {0}
        run: |
          BUILD_ROOT="$(cygpath -u "$RUNNER_TEMP")/llvm-build"
          cmake --build "$BUILD_ROOT" --target install --parallel

      - name: Build LLVM (Windows MSVC)
        if: runner.os == 'Windows' && matrix.msys2 == ''
        shell: bash
        run: cmake --build "$RUNNER_TEMP/llvm-build" --config Release --target install --parallel

      - name: Build LLVM (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build "$RUNNER_TEMP/llvm-build" --target install --parallel

      # ── Verify & package ────────────────────────────────────────
      - name: Verify installation
        shell: bash
        run: |
          PREFIX="$RUNNER_TEMP/llvm-install"
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f "$PREFIX/bin/clang.exe" || { echo "clang.exe not found"; exit 1; }
          else
            test -x "$PREFIX/bin/llvm-config" || { echo "llvm-config not found"; exit 1; }
          fi
          test -f "$PREFIX/include/llvm-c/Types.h" || { echo "LLVM C API headers not found"; exit 1; }
          echo "LLVM installation verified"

      - name: Generate file list
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          PREFIX="$RUNNER_TEMP/llvm-install"
          find "$PREFIX" -type f -printf '%P\t%s\n' | sort > "files-v${VERSION}-${TARGET}.txt" 2>/dev/null || \
            find "$PREFIX" -type f | while read -r f; do
              rel="${f#$PREFIX/}"
              size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null || echo 0)
              printf '%s\t%s\n' "$rel" "$size"
            done | sort > "files-v${VERSION}-${TARGET}.txt"

      - name: Create archive (tar.xz)
        if: matrix.archive_ext == 'tar.xz'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          tar cJf "llvm-${VERSION}-${TARGET}.tar.xz" -C "$RUNNER_TEMP/llvm-install" .

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          cd "$RUNNER_TEMP/llvm-install"
          7z a "$GITHUB_WORKSPACE/llvm-${VERSION}-${TARGET}.zip" .

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: llvm-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}

      - name: Upload file list artifact
        uses: actions/upload-artifact@v4
        with:
          name: files-v${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: files-v${{ steps.version.outputs.version }}-${{ matrix.target }}.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from branch name
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${BRANCH#b}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' -o -name 'files-*.txt' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Collect file lists
        shell: bash
        run: |
          find artifacts -name 'files-*.txt' -exec cp {} . \;
          ls -la files-*.txt

      - name: Commit file lists
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files-*.txt
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Add file lists for v${{ steps.version.outputs.version }}"
          git push

      - name: Force update version tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -f "v${VERSION}"
          git push -f origin "v${VERSION}"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: LLVM ${{ steps.version.outputs.version }}
          body: |
            Prebuilt LLVM ${{ steps.version.outputs.version }} archives with full API and clang.

            ## Archives
            | Target | Archive | Files |
            |--------|---------|-------|
            | Linux x86_64 | `llvm-${{ steps.version.outputs.version }}-linux-x86_64.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-linux-x86_64.txt) |
            | Linux AArch64 | `llvm-${{ steps.version.outputs.version }}-linux-aarch64.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-linux-aarch64.txt) |
            | Linux x86_64 (musl) | `llvm-${{ steps.version.outputs.version }}-linux-x86_64-musl.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-linux-x86_64-musl.txt) |
            | Linux AArch64 (musl) | `llvm-${{ steps.version.outputs.version }}-linux-aarch64-musl.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-linux-aarch64-musl.txt) |
            | Linux i686 | `llvm-${{ steps.version.outputs.version }}-linux-i686.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-linux-i686.txt) |
            | macOS ARM64 | `llvm-${{ steps.version.outputs.version }}-macos-aarch64.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-macos-aarch64.txt) |
            | macOS Intel | `llvm-${{ steps.version.outputs.version }}-macos-x86_64.tar.xz` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-macos-x86_64.txt) |
            | Windows x64 (MSVC) | `llvm-${{ steps.version.outputs.version }}-windows-msvc.zip` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-windows-msvc.txt) |
            | Windows x64 (GNU) | `llvm-${{ steps.version.outputs.version }}-windows-gnu.zip` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-windows-gnu.txt) |
            | Windows ARM64 (MSVC) | `llvm-${{ steps.version.outputs.version }}-windows-aarch64-msvc.zip` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-windows-aarch64-msvc.txt) |
            | Windows i686 (MSVC) | `llvm-${{ steps.version.outputs.version }}-windows-i686-msvc.zip` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-windows-i686-msvc.txt) |
            | Windows i686 (GNU) | `llvm-${{ steps.version.outputs.version }}-windows-i686-gnu.zip` | [files](https://github.com/yasuo-ozu/llvm-full/releases/download/v${{ steps.version.outputs.version }}/files-v${{ steps.version.outputs.version }}-windows-i686-gnu.txt) |
          files: release-assets/*
          draft: false
          prerelease: false
