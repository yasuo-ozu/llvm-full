name: Test Action

on:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.version }} / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "10.0.1"
          - "11.0.1"
          - "12.0.1"
          - "13.0.1"
          - "14.0.6"
          - "15.0.7"
          - "16.0.6"
          - "17.0.6"
          - "18.1.8"
          - "19.1.7"
          - "20.1.8"
          - "21.1.4"
          - "22.1.0"
        target:
          - linux-x86_64
          - linux-aarch64
          - linux-x86_64-musl
          - linux-aarch64-musl
          - linux-i686
          - macos-aarch64
          - macos-x86_64
          - windows-msvc
          - windows-gnu
          - windows-aarch64-msvc
          - windows-i686-msvc
          - windows-i686-gnu
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: linux-x86_64-musl
            runner: ubuntu-latest
          - target: linux-aarch64-musl
            runner: ubuntu-24.04-arm
          - target: linux-i686
            runner: ubuntu-latest
          - target: macos-aarch64
            runner: macos-latest
          - target: macos-x86_64
            runner: macos-13
          - target: windows-msvc
            runner: windows-latest
          - target: windows-gnu
            runner: windows-latest
          - target: windows-aarch64-msvc
            runner: windows-11-arm
          - target: windows-i686-msvc
            runner: windows-latest
          - target: windows-i686-gnu
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Runtime dependencies for non-native targets ───────────────
      - name: Install musl runtime
        if: matrix.target == 'linux-x86_64-musl' || matrix.target == 'linux-aarch64-musl'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl

      - name: Install i386 runtime
        if: matrix.target == 'linux-i686'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq libc6:i386 libstdc++6:i386 zlib1g:i386

      - name: Add MINGW64 to PATH
        if: matrix.target == 'windows-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw64\\bin" >> "$GITHUB_PATH"

      - name: Add MINGW32 to PATH
        if: matrix.target == 'windows-i686-gnu'
        shell: bash
        run: echo "C:\\msys64\\mingw32\\bin" >> "$GITHUB_PATH"

      # ── Install LLVM via the action ───────────────────────────────
      - name: Install LLVM
        id: llvm
        uses: ./
        with:
          version: ${{ matrix.version }}
          target: ${{ matrix.target }}
          fallback: "false"

      # ── Verify llvm-config and all components ─────────────────────
      - name: Verify llvm-config and components
        shell: bash
        run: |
          CONFIG="${LLVM_CONFIG:-}"
          if [ -z "$CONFIG" ]; then
            if command -v llvm-config >/dev/null 2>&1; then
              CONFIG="llvm-config"
            elif command -v llvm-config.exe >/dev/null 2>&1; then
              CONFIG="llvm-config.exe"
            else
              echo "::warning::llvm-config not found in PATH or LLVM_CONFIG"
              echo "Skipping llvm-config verification"
              exit 0
            fi
          fi

          echo "llvm-config: $CONFIG"

          # Check that llvm-config is actually runnable (may fail for cross-target
          # binaries that need runtime DLLs not present on the host)
          if ! version=$("$CONFIG" --version 2>/dev/null); then
            echo "::warning::llvm-config found but not runnable (missing runtime libraries?)"
            echo "Skipping llvm-config verification"
            exit 0
          fi
          echo "LLVM version: $version"

          # List all components
          components=$("$CONFIG" --components)
          echo "Components: $components"
          count=$(echo "$components" | wc -w)
          echo "Component count: $count"

          if [ "$count" -lt 5 ]; then
            echo "::error::Too few components ($count)"
            exit 1
          fi

          # Verify core components exist
          for comp in core support analysis; do
            if ! echo " $components " | grep -q " $comp "; then
              echo "::error::Missing core component: $comp"
              exit 1
            fi
          done

          # Verify library files exist for every component
          missing=0
          for comp in $components; do
            files=$("$CONFIG" --libfiles "$comp" 2>/dev/null) || continue
            for f in $files; do
              check="$f"
              if [ "$RUNNER_OS" = "Windows" ]; then
                check="$(cygpath -u "$f" 2>/dev/null || echo "$f")"
              fi
              if [ ! -f "$check" ]; then
                echo "::warning::Missing library for $comp: $f"
                missing=$((missing + 1))
              fi
            done
          done

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing library file(s) missing"
            exit 1
          fi

          echo "All $count components verified."
