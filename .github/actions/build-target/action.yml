name: "Build Target"
description: "Auto-detect target from workflow filename, build and package LLVM"

inputs:
  github_token:
    description: "GitHub token for API access"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install bash (Alpine container)
      if: runner.os == 'Linux'
      shell: sh
      run: |
        if command -v apk > /dev/null 2>&1 && ! command -v bash > /dev/null 2>&1; then
          apk add --no-cache bash
        fi

    - name: Detect target and config
      id: config
      shell: bash
      run: |
        # Detect target from calling workflow filename
        # GITHUB_WORKFLOW_REF = "owner/repo/.github/workflows/ubuntu-latest--linux-x86_64.yml@refs/..."
        WORKFLOW_FILE="${GITHUB_WORKFLOW_REF%%@*}"
        WORKFLOW_FILE="${WORKFLOW_FILE##*/}"
        WORKFLOW_FILE="${WORKFLOW_FILE%.yml}"
        TARGET="${WORKFLOW_FILE#*--}"

        # Parse version from branch name
        VERSION="${GITHUB_REF_NAME#b}"
        MAJOR="${VERSION%%.*}"

        echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

        # Lookup target config
        case "$TARGET" in
          linux-x86_64)         LLVM_TARGETS="X86";         EXT="tar.xz"; MSYS2="";       CONTAINER="" ;;
          linux-aarch64)        LLVM_TARGETS="AArch64";     EXT="tar.xz"; MSYS2="";       CONTAINER="" ;;
          linux-x86_64-musl)    LLVM_TARGETS="X86";         EXT="tar.xz"; MSYS2="";       CONTAINER="alpine:3.21" ;;
          linux-aarch64-musl)   LLVM_TARGETS="AArch64";     EXT="tar.xz"; MSYS2="";       CONTAINER="alpine:3.21" ;;
          linux-i686)           LLVM_TARGETS="X86";         EXT="tar.xz"; MSYS2="";       CONTAINER="i386/debian:bookworm" ;;
          macos-aarch64)        LLVM_TARGETS="X86;AArch64"; EXT="tar.xz"; MSYS2="";       CONTAINER="" ;;
          macos-x86_64)         LLVM_TARGETS="X86;AArch64"; EXT="tar.xz"; MSYS2="";       CONTAINER="" ;;
          windows-msvc)         LLVM_TARGETS="X86";         EXT="zip";    MSYS2="";       CONTAINER="" ;;
          windows-aarch64-msvc) LLVM_TARGETS="AArch64";     EXT="zip";    MSYS2="";       CONTAINER="" ;;
          windows-i686-msvc)    LLVM_TARGETS="X86";         EXT="zip";    MSYS2="";       CONTAINER="" ;;
          windows-gnu)          LLVM_TARGETS="X86";         EXT="zip";    MSYS2="MINGW64"; CONTAINER="" ;;
          windows-i686-gnu)     LLVM_TARGETS="X86";         EXT="zip";    MSYS2="MINGW32"; CONTAINER="" ;;
          *) echo "Unknown target: $TARGET"; exit 1 ;;
        esac

        echo "llvm_targets=${LLVM_TARGETS}" >> "$GITHUB_OUTPUT"
        echo "archive_ext=${EXT}" >> "$GITHUB_OUTPUT"
        echo "msys2=${MSYS2}" >> "$GITHUB_OUTPUT"
        echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
        echo "Detected target=$TARGET version=$VERSION llvm_targets=$LLVM_TARGETS ext=$EXT msys2=$MSYS2"

    - name: Build in Docker (Alpine on ARM64)
      id: docker-build
      if: steps.config.outputs.container != '' && runner.arch == 'ARM64' && startsWith(steps.config.outputs.container, 'alpine')
      shell: bash
      run: |
        CONTAINER="${{ steps.config.outputs.container }}"
        VERSION="${{ steps.config.outputs.version }}"
        MAJOR="${{ steps.config.outputs.major }}"
        LLVM_TARGETS="${{ steps.config.outputs.llvm_targets }}"

        cat > "$RUNNER_TEMP/docker-build.sh" << 'BUILDSCRIPT'
        #!/bin/sh
        set -eu
        apk add --no-cache cmake ninja gcc g++ musl-dev linux-headers python3 git bash

        git clone --depth 1 --branch "llvmorg-${VERSION}" \
          https://github.com/llvm/llvm-project /tmp/llvm-project

        cmake_args=""
        if [ "${MAJOR}" -le 11 ]; then
          cmake_args="-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        fi

        cmake -S /tmp/llvm-project/llvm -B /tmp/llvm-build -G Ninja \
          $cmake_args \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/runner-temp/llvm-install \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_TARGETS_TO_BUILD="${LLVM_TARGETS}" \
          -DLLVM_ENABLE_TERMINFO=OFF

        cmake --build /tmp/llvm-build --target install --parallel
        BUILDSCRIPT

        docker run --rm \
          -v "$RUNNER_TEMP:/runner-temp" \
          -e VERSION="$VERSION" \
          -e MAJOR="$MAJOR" \
          -e LLVM_TARGETS="$LLVM_TARGETS" \
          "$CONTAINER" \
          sh /runner-temp/docker-build.sh

        echo "done=true" >> "$GITHUB_OUTPUT"

    - name: Setup build dependencies
      if: steps.docker-build.outputs.done != 'true'
      uses: ./.github/actions/setup-build-deps
      with:
        target: ${{ steps.config.outputs.target }}
        container: ${{ steps.config.outputs.container }}
        msys2: ${{ steps.config.outputs.msys2 }}

    - name: Build and package LLVM
      id: build
      uses: ./.github/actions/build-and-package-llvm
      with:
        version: ${{ steps.config.outputs.version }}
        major: ${{ steps.config.outputs.major }}
        target: ${{ steps.config.outputs.target }}
        llvm_targets: ${{ steps.config.outputs.llvm_targets }}
        archive_ext: ${{ steps.config.outputs.archive_ext }}
        msys2: ${{ steps.config.outputs.msys2 }}
        github_token: ${{ inputs.github_token }}

    - name: Upload archive artifact
      uses: actions/upload-artifact@v4
      with:
        name: llvm-${{ steps.config.outputs.version }}-${{ steps.config.outputs.target }}
        path: llvm-${{ steps.config.outputs.version }}-${{ steps.config.outputs.target }}.${{ steps.config.outputs.archive_ext }}

    - name: Upload file list artifact
      uses: actions/upload-artifact@v4
      with:
        name: files-v${{ steps.config.outputs.version }}-${{ steps.config.outputs.target }}
        path: files-v${{ steps.config.outputs.version }}-${{ steps.config.outputs.target }}.txt
